name: Build, Test and Publish Docker Image v2

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: 1fini/tennisscoreapi

  # Fallbacks pour éviter les erreurs sur PR forkées
  DB_USER: ${{ secrets.DB_USER || 'test_user' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'test_password' }}
  DB_NAME: ${{ secrets.DB_NAME || 'test_db' }}
  DB_PORT: ${{ secrets.DB_PORT || '5432' }}
  DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}

jobs:
  # -----------------------------
  # 1️⃣ JOB : BUILD & TEST
  # -----------------------------
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        options: >-
          --health-cmd "pg_isready -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..5}; do
            pg_isready -h localhost -p $DB_PORT -U $DB_USER -d $DB_NAME && break
            echo "Waiting for Postgres to be ready..."
            sleep 5
          done
        env:
          PGPASSWORD: $DB_PASSWORD

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        env:
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST: ${{ env.DB_HOST }}
        run: dotnet test --verbosity minimal

      - name: Build Docker image (test only)
        run: docker build -t $DOCKER_IMAGE_NAME:test .

  # -----------------------------
  # 2️⃣ JOB : PUBLISH DOCKER IMAGE
  # -----------------------------
  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository_owner == '1fini'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DH_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
